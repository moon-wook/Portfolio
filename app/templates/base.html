<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ profile.name_ko }} | Portfolio</title>
    <meta name="description" content="{{ profile.subtitle }}">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: { 900: '#060a13', 800: '#0a0f1e', 700: '#111827', 600: '#1a2332' },
                        accent: { blue: '#3b82f6', cyan: '#06b6d4', purple: '#8b5cf6' },
                    },
                    fontFamily: {
                        sans: ['Pretendard', 'Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <!-- Fonts -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">

    <!-- Material Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Round">

    <!-- ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>

    <!-- Mermaid -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>
        mermaid.initialize({
            startOnLoad: true,
            theme: 'dark',
            themeVariables: {
                darkMode: true,
                background: '#0a0f1e',
                primaryColor: '#1e3a5f',
                primaryTextColor: '#e2e8f0',
                primaryBorderColor: '#3b82f6',
                lineColor: '#64748b',
                secondaryColor: '#1a2332',
                tertiaryColor: '#111827',
            }
        });
    </script>

    <!-- Simple Icons CDN for tech logos -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/simple-icons-font@v13/font/simple-icons.min.css">

    <link rel="stylesheet" href="/static/css/custom.css">
</head>
<body class="bg-dark-900 text-gray-200 font-sans overflow-x-hidden">

    <!-- Navigation -->
    <nav id="navbar" class="fixed top-0 left-0 right-0 z-50 transition-all duration-300 bg-dark-900/80 backdrop-blur-lg border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="#" class="text-lg font-bold gradient-text">{{ profile.name_ko }}</a>
            <div class="hidden md:flex items-center gap-8 text-sm text-gray-400">
                <a href="#skills" class="nav-link hover:text-white transition">Tech Stack</a>
                <a href="#projects" class="nav-link hover:text-white transition">Projects</a>
                <a href="#timeline" class="nav-link hover:text-white transition">Timeline</a>
                <a href="#contact" class="nav-link hover:text-white transition">Contact</a>
            </div>
            <!-- Mobile menu button -->
            <button id="mobile-menu-btn" class="md:hidden text-gray-400 hover:text-white">
                <span class="material-icons-round">menu</span>
            </button>
        </div>
        <!-- Mobile menu -->
        <div id="mobile-menu" class="hidden md:hidden bg-dark-800/95 backdrop-blur-lg border-t border-white/5">
            <div class="px-6 py-4 flex flex-col gap-4 text-sm text-gray-400">
                <a href="#skills" class="hover:text-white transition">Tech Stack</a>
                <a href="#projects" class="hover:text-white transition">Projects</a>
                <a href="#timeline" class="hover:text-white transition">Timeline</a>
                <a href="#contact" class="hover:text-white transition">Contact</a>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <script src="/static/js/charts.js"></script>
    <script>
        // Mobile menu toggle
        document.getElementById('mobile-menu-btn')?.addEventListener('click', () => {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        });
        // Close mobile menu on link click
        document.querySelectorAll('#mobile-menu a').forEach(a => {
            a.addEventListener('click', () => document.getElementById('mobile-menu').classList.add('hidden'));
        });

        // Smooth scroll
        document.querySelectorAll('a[href^="#"]').forEach(a => {
            a.addEventListener('click', e => {
                e.preventDefault();
                const target = document.querySelector(a.getAttribute('href'));
                if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            });
        });

        // Scroll animations
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

        document.querySelectorAll('.fade-in-up, .fade-in-left, .fade-in-right').forEach(el => observer.observe(el));

        // Active nav link
        const sections = document.querySelectorAll('section[id]');
        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY + 100;
            sections.forEach(sec => {
                const top = sec.offsetTop;
                const height = sec.offsetHeight;
                const id = sec.getAttribute('id');
                const link = document.querySelector(`.nav-link[href="#${id}"]`);
                if (link) {
                    if (scrollY >= top && scrollY < top + height) {
                        link.classList.add('text-white');
                    } else {
                        link.classList.remove('text-white');
                    }
                }
            });
        });
    </script>
</body>
</html>
